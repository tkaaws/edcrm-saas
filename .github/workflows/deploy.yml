name: Deploy to Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: edcrm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, mbstring, mysqli, pdo_mysql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare PHPUnit environment
        run: |
          cp env .env
          cat <<'EOF' >> .env
          CI_ENVIRONMENT = testing
          app.baseURL = 'http://127.0.0.1/'
          tests.db.hostname = 127.0.0.1
          tests.db.database = edcrm_test
          tests.db.username = root
          tests.db.password = root
          tests.db.DBDriver = MySQLi
          tests.db.DBPrefix =
          tests.db.port = 3306
          tests.db.charset = utf8mb4
          tests.db.DBCollat = utf8mb4_unicode_ci
          cache.handler = dummy
          cache.backupHandler = dummy
          EOF

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testsuite unit,feature,session --no-coverage

      - name: Run PHPUnit database suite
        run: vendor/bin/phpunit --testsuite database --no-coverage

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add droplet host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Run deploy script on droplet
        run: |
          ssh "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" "bash /var/www/edcrm-saas/scripts/deploy.sh main"
